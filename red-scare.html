<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Red Scare &mdash; JKMRY</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #FFFFFF; --ink: #161614; --soft: #4A4A46; --muted: #8C8C84;
    --line: #DCDBD4; --accent: #3E7D5A;
    --font: 'Jost', 'Futura', 'Helvetica Neue', Arial, sans-serif;
  }
  html { font-size: 16px; }
  body {
    background: var(--bg); color: var(--ink); font-family: var(--font);
    font-weight: 400; line-height: 1.6; min-height: 100vh;
    display: flex; flex-direction: column; -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }
  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 2.2rem 4.5rem; font-size: 0.66rem; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.16em; color: var(--muted);
  }
  .topbar a { transition: color 0.2s ease; }
  .topbar a:hover { color: var(--accent); }
  .stage {
    flex: 1; display: flex; flex-direction: column; justify-content: center;
    max-width: 1280px; margin: 0 auto; width: 100%; padding: 4rem 4.5rem;
  }
  .eyebrow {
    font-size: 0.66rem; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.2em; color: var(--accent); margin-bottom: 1.4rem;
  }
  .stage h1 {
    font-size: clamp(2.4rem, 6vw, 5rem); font-weight: 500; line-height: 1.02;
    letter-spacing: -0.02em; margin-bottom: 0.6rem;
  }
  .premise {
    font-size: clamp(1.1rem, 2vw, 1.45rem); font-weight: 300;
    color: var(--soft); max-width: 46ch; line-height: 1.45;
  }
  .status {
    margin-top: 2.4rem; align-self: flex-start; font-size: 0.66rem;
    font-weight: 500; text-transform: uppercase; letter-spacing: 0.16em;
    color: var(--muted); border: 1px solid var(--line); border-radius: 999px;
    padding: 12px 22px;
  }
  .video-player { width: 100%; margin: 2.2rem 0 0; background: #000; border: 1px solid var(--line); }
  .video-player video { display: block; width: 100%; height: auto; max-height: 82vh; background: #000; }
  .site-footer {
    border-top: 1px solid var(--line); padding: 2.2rem 4.5rem;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 0.66rem; font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.16em; color: var(--soft);
  }
  .site-footer a:hover { color: var(--accent); }
  @media (max-width: 600px) {
    .topbar, .stage, .site-footer { padding-left: 1.25rem; padding-right: 1.25rem; }
  }
</style>
</head>
<body>
  <header class="topbar">
    <a href="index.html">&larr; JKMRY</a>
    <span>Video</span>
  </header>
  <main class="stage">
    <p class="eyebrow">Video</p>
    <h1>Red Scare</h1>
    <figure class="video-player">
      <video controls preload="none" playsinline poster="video/red-scare.jpg">
        <source src="https://video.jkmry.com/red-scare.mp4" type="video/mp4">
      </video>
    </figure>
  </main>
  <footer class="site-footer">
    <span>JKMRY</span>
    <a href="index.html">&larr; Back to work</a>
  </footer>
</body>
</html>
